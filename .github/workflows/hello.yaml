name: Hello World
env:
  APP_NAME: "Demo Application"
on: 
  push:
    branches: [main]
    paths-ignore:
      - ".github/workflows/*"
  pull_request:
    branches: [main]
  repository_dispatch:
    types: ["on-demand-test"]
jobs:
  echo-vars:
    env:
      PACKAGE_PATH: "."
    runs-on: ubuntu-latest
    steps:
      - name: Echo GitHub variable
        env:
          APP_VERSION: "1.0.0"
          RUNNER_CONTEXT: ${{ toJson(runner) }}
        run: |
          echo "This job trigger by ${{ github.event_name}}"
          echo "This repository is ${{ github.repository }}"
          echo "This branch is ${{ github.ref_name }}"
          echo "This is a ${{ env.APP_NAME }} version ${{ env.APP_VERSION }}"
          echo "$RUNNER_CONTEXT"
  hello-job:
    runs-on: ubuntu-latest
    steps:
     - name: Run a one-line script
       run: echo "Hello Github Actions!"
     - name: Retreive client payload
       run: echo "Client send status = ${{ github.event.client_payload.status }}"
  second-job:
    runs-on: windows-latest
    needs: hello-job
    steps:
      - run: echo "This job is running on ${{ runner.os }}"
